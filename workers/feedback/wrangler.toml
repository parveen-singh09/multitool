# Standalone Worker for the feedback form. Pages Functions can't use the
# send_email binding (Workers-only), so this Worker owns /api/feedback and
# a route on the zone overrides Pages for that one path.
name = "toolsilk-feedback"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Cloudflare Email Routing send binding. destination_address pins the only
# recipient — it MUST be a verified destination in Email Routing.
[[send_email]]
name = "FEEDBACK_EMAIL"
destination_address = "contactfeedback9@gmail.com"

[vars]
FEEDBACK_TO = "contactfeedback9@gmail.com"
FEEDBACK_FROM = "feedback@toolsilk.com"

# This route intercepts the path before Pages sees it. Same origin as the
# site, so the form needs no CORS and no change.
routes = [
  { pattern = "toolsilk.com/api/feedback", zone_name = "toolsilk.com" }
]
